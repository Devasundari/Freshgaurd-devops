name: FreshGuard CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to Azure Container Registry
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/freshguard:${{ github.sha }} .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/freshguard:${{ github.sha }}

    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group ${{ secrets.RESOURCE_GROUP }} \
          --name ${{ secrets.AKS_CLUSTER }} \
          --overwrite-existing

    - name: Update Deployment Image
      run: |
        kubectl set image deployment/freshguard-deployment \
        freshguard=${{ secrets.ACR_NAME }}.azurecr.io/freshguard:${{ github.sha }}

    - name: Verify Rollout
      run: |
        kubectl rollout status deployment/freshguard-deployment