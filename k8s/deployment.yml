apiVersion: apps/v1
kind: Deployment

metadata:
  name: freshguard-deployment
  labels:
    app: freshguard

spec:
  replicas: 2

  selector:
    matchLabels:
      app: freshguard

  template:
    metadata:
      labels:
        app: freshguard

    spec:
      containers:
        - name: freshguard
          image: freshguardacr12345.azurecr.io/freshguard:v1
          ports:
            - containerPort: 5000